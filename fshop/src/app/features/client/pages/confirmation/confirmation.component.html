<app-header></app-header>

<div class="confirmation-page">
  <div class="container py-5">
    <div class="card border-0 shadow rounded-4 p-5 text-center">
      <div class="mb-4">
        <i class="fas fa-check-circle text-success" style="font-size: 80px;"></i>
      </div>
      <h1 class="fw-bold mb-3">Merci pour votre commande !</h1>
      <p class="text-muted mb-4">
        Votre commande a été enregistrée avec succès.
      </p>
      <div class="alert alert-info d-inline-block mx-auto">
        <strong>Référence : {{ reference }}</strong>
      </div>
      <p class="mt-4">
        Vous pouvez suivre l'état de votre commande dans votre espace client.
      </p>
      <div class="mt-4">
        <button class="btn btn-primary px-4" routerLink="/accueil">
          <i class="fas fa-home me-2"></i>Retour à l'accueil
        </button>
      </div>
    </div>
  </div>
</div>
